name: CI

on: 
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-24.04

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                python-version: 3.10

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install uv
            
            - name: Sync dependencies
              run: |
                uv sync 

            - name: Run tests
              run: |
                uv run pytest